name: Draw keymap

on:
  workflow_dispatch:
  push:
    paths:
      - "config/keymap.keymap"
      - "keymap-drawer/**"
      - ".github/workflows/draw-keymap.yml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/keymap.keymap"
      config_path: "keymap-drawer/config.yaml"
      json_path: "keymap-drawer"
      output_folder: "keymap-drawer"
      west_config_path: "config"
      amend_commit: false
